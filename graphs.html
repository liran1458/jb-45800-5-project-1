<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script defer src="app.js"></script>
</head>

<body class="bg-gray-100 min-h-screen">

    <header id="myHeader"></header>

    <nav id="nav"></nav>

    <main class="max-w-4xl mx-auto mt-8 bg-white shadow p-6 rounded-lg">

        <h2 class="text-2xl font-semibold mb-6">Graphs & Reports</h2>

        <div class="mb-10">
            <h3 class="text-xl font-semibold mb-2">Expenses by Category</h3>
            <canvas id="pieChart" class="w-full max-h-96"></canvas>
        </div>

        <div class="mb-10">
            <h3 class="text-xl font-semibold mb-2">Expenses by Month</h3>
            <canvas id="barChart" class="w-full max-h-96"></canvas>
        </div>

        <div class="flex gap-4 mt-6">
            <button id="download-pdf"
                class="bg-blue-600 text-white py-2 px-4 rounded hover:bg-blue-700 transition">
                Download PDF Report
            </button>

            <button id="download-csv"
                class="bg-gray-700 text-white py-2 px-4 rounded hover:bg-gray-800 transition">
                Download CSV File
            </button>
        </div>

    </main>

</body>

</html>
